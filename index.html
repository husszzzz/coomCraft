<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل أكواد HTML | الحسني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --primary: #007aff;
            --text: #ffffff;
            --container-bg: #1c1c1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* تصميم الهيدر (العنوان) */
        .header {
            margin-top: 30px;
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 122, 255, 0.3);
            margin-bottom: 10px;
        }

        .header p {
            color: #8e8e93;
            font-size: 1.1rem;
        }

        /* تصميم زر الرفع */
        .upload-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        /* إخفاء الانبوت الأصلي */
        input[type="file"] {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #007aff, #005bb5);
            color: #fff;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 122, 255, 0.5);
        }

        /* تصميم شاشة العرض (iFrame) */
        .preview-section {
            width: 100%;
            max-width: 1000px;
            display: none; /* مخفية بالبداية */
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-header {
            width: 100%;
            background: #2c2c2e;
            padding: 10px 20px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #3a3a3c;
            border-bottom: none;
        }

        .preview-title {
            font-size: 1rem;
            color: #e5e5ea;
        }

        .close-btn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .iframe-container {
            width: 100%;
            height: 60vh;
            background: #ffffff; /* خلفية بيضاء لملفات الـ HTML لضمان وضوحها */
            border-radius: 0 0 15px 15px;
            border: 1px solid #3a3a3c;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* حقوق المطور */
        footer {
            margin-top: auto;
            padding: 20px;
            color: #8e8e93;
            font-size: 0.9rem;
        }

        footer span {
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>أداة الحسني</h1>
        <p>مشغل ملفات HTML المباشر</p>
    </div>

    <div class="upload-wrapper" id="uploadWrapper">
        <input type="file" id="fileInput" accept=".html">
        <label for="fileInput" class="upload-btn">
            <i class="fa-solid fa-file-code"></i>
            ارفع ملفك
        </label>
    </div>

    <div class="preview-section" id="previewSection">
        <div class="preview-header">
            <div class="preview-title" id="fileNameDisplay"><i class="fa-solid fa-window-maximize"></i> جاري العرض...</div>
            <button class="close-btn" onclick="closePreview()">إغلاق الملف</button>
        </div>
        <div class="iframe-container">
            <iframe id="htmlViewer"></iframe>
        </div>
    </div>

    <footer>
        تم البرمجة والتطوير بواسطة <span>الحسني</span> &copy; 2026
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const htmlViewer = document.getElementById('htmlViewer');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const uploadWrapper = document.getElementById('uploadWrapper');

        // عند اختيار ملف
        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            
            if (file) {
                // التأكد من أن الملف بصيغة HTML
                if (file.name.endsWith('.html') || file.type === 'text/html') {
                    
                    // تحويل الملف إلى رابط مؤقت لعرضه
                    const fileURL = URL.createObjectURL(file);
                    
                    // إرسال الرابط للـ iframe
                    htmlViewer.src = fileURL;
                    
                    // عرض اسم الملف
                    fileNameDisplay.innerHTML = `<i class="fa-solid fa-code"></i> ${file.name}`;
                    
                    // إخفاء زر الرفع وإظهار شاشة العرض
                    uploadWrapper.style.display = 'none';
                    previewSection.style.display = 'flex';

                } else {
                    alert('عذراً! هذه الأداة تدعم ملفات HTML فقط.');
                    // تفريغ الانبوت إذا كان الملف خاطئ
                    fileInput.value = ''; 
                }
            }
        });

        // دالة لإغلاق العرض والرجوع للزر
        function closePreview() {
            htmlViewer.src = ''; // تفريغ الذاكرة
            previewSection.style.display = 'none';
            uploadWrapper.style.display = 'block';
            fileInput.value = ''; // تصفير الملف لاختيار ملف جديد
        }
    </script>

</body>
</html>
