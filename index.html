<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة الحسني | المطور الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --primary: #007aff;
            --card-bg: #1c1c1e;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 122, 255, 0.15), transparent 60%);
        }

        .header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .header h1 { font-size: 2.8rem; color: var(--primary); text-shadow: 0 0 20px rgba(0, 122, 255, 0.4); }
        .header p { color: #8e8e93; font-size: 1.1rem; }

        /* الأزرار العلوية (Tabs) */
        .tabs { display: flex; gap: 10px; background: #1c1c1e; padding: 8px; border-radius: 20px; border: 1px solid #3a3a3c; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: transparent; color: #8e8e93; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3); }

        /* منطقة المحتوى */
        .content-section { width: 100%; max-width: 800px; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid #3a3a3c; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: none; animation: fadeIn 0.4s; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* المدخلات والنصوص */
        textarea, input[type="text"] { width: 100%; background: #000; color: #32d74b; border: 1px solid #3a3a3c; border-radius: 15px; padding: 15px; font-family: 'Courier New', monospace; outline: none; direction: ltr; margin-bottom: 15px; }
        textarea { height: 200px; resize: none; }
        input[type="text"] { height: 50px; font-size: 1.1rem; }

        .btn-group { display: flex; gap: 10px; }
        button.action-btn { flex: 1; background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button.action-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
        button.secondary-btn { background: #2c2c2e; color: #fff; }

        /* رفع الملف */
        input[type="file"] { display: none; }
        .upload-label { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 150px; border: 2px dashed var(--primary); border-radius: 15px; cursor: pointer; color: var(--primary); font-size: 1.2rem; font-weight: bold; background: rgba(0, 122, 255, 0.05); transition: 0.3s; }
        .upload-label:hover { background: rgba(0, 122, 255, 0.1); }
        .upload-label i { font-size: 2.5rem; margin-bottom: 10px; }

        /* شاشة العرض (النافذة) */
        .preview-window { width: 100%; max-width: 1000px; margin-top: 30px; display: none; border-radius: 15px; overflow: hidden; border: 1px solid #3a3a3c; }
        .preview-header { background: #2c2c2e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .preview-header span { color: #fff; font-weight: bold; }
        .close-btn { background: #ff3b30; border: none; color: white; padding: 5px 15px; border-radius: 8px; cursor: pointer; }
        iframe { width: 100%; height: 60vh; background: #fff; border: none; }

        /* تنبيه الرابط */
        .temp-link-box { margin-top: 15px; padding: 15px; background: rgba(50, 215, 75, 0.1); border: 1px solid #32d74b; border-radius: 10px; color: #32d74b; display: none; word-break: break-all; direction: ltr; text-align: left;}

        footer { margin-top: auto; padding: 20px; color: #8e8e93; }
        footer span { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>أداة الحسني</h1>
        <p>المختبر الشامل لأكواد HTML</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('editor')"><i class="fa-solid fa-code"></i> محرر الأكواد</button>
        <button class="tab-btn" onclick="switchTab('file')"><i class="fa-solid fa-file-html"></i> تشغيل ملف</button>
        <button class="tab-btn" onclick="switchTab('fetcher')"><i class="fa-solid fa-magnet"></i> سحب كود موقع</button>
    </div>

    <div class="content-section active" id="editorSection">
        <h3 style="margin-bottom: 15px; color: #fff;">اكتب أو الصق كود HTML:</h3>
        <textarea id="htmlInput" placeholder="<h1>مرحباً بك في أداة الحسني</h1>"></textarea>
        
        <div class="btn-group">
            <button class="action-btn" onclick="runCode()"><i class="fa-solid fa-play"></i> تشغيل الكود</button>
            <button class="action-btn secondary-btn" onclick="generateTempLink()"><i class="fa-solid fa-link"></i> إنشاء رابط مؤقت</button>
        </div>
        <div class="temp-link-box" id="tempLinkBox"></div>
    </div>

    <div class="content-section" id="fileSection">
        <h3 style="margin-bottom: 15px; color: #fff;">ارفع ملفك المبرمج:</h3>
        <input type="file" id="fileUploader" accept=".html">
        <label for="fileUploader" class="upload-label">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            اضغط هنا لاختيار ملف HTML
        </label>
    </div>

    <div class="content-section" id="fetcherSection">
        <h3 style="margin-bottom: 15px; color: #fff;">ضع رابط أي موقع لسحب كوده:</h3>
        <input type="text" id="targetUrl" placeholder="https://example.com">
        <button class="action-btn" onclick="fetchWebsiteCode()" id="fetchBtn" style="margin-bottom: 15px;"><i class="fa-solid fa-search"></i> سحب الكود الآن</button>
        
        <textarea id="fetchedCode" placeholder="سيظهر كود الموقع هنا..." readonly></textarea>
        <button class="action-btn secondary-btn" onclick="copyFetchedCode()"><i class="fa-solid fa-copy"></i> نسخ الكود</button>
    </div>

    <div class="preview-window" id="previewWindow">
        <div class="preview-header">
            <span><i class="fa-solid fa-desktop"></i> المعاينة المباشرة</span>
            <button class="close-btn" onclick="closePreview()">إغلاق</button>
        </div>
        <iframe id="viewer"></iframe>
    </div>

    <footer>تم البرمجة بواسطة <span>الحسني</span> &copy; 2026</footer>

    <script>
        // دالة تبديل الأقسام
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tabId + 'Section').classList.add('active');
            closePreview();
        }

        // 1. تشغيل الكود المكتوب
        function runCode() {
            const code = document.getElementById('htmlInput').value;
            if(!code) return alert("الرجاء إدخال الكود أولاً!");
            showInIframe(code);
        }

        // إنشاء رابط مؤقت (Blob URL)
        function generateTempLink() {
            const code = document.getElementById('htmlInput').value;
            if(!code) return alert("الرجاء إدخال الكود أولاً!");
            
            // تحويل الكود إلى ملف وهمي في المتصفح
            const blob = new Blob([code], { type: 'text/html' });
            const tempUrl = URL.createObjectURL(blob);
            
            const linkBox = document.getElementById('tempLinkBox');
            linkBox.style.display = 'block';
            linkBox.innerHTML = `<strong>رابطك المؤقت جاهز:</strong><br><a href="${tempUrl}" target="_blank" style="color: #32d74b;">${tempUrl}</a><br><small style="color:#8e8e93;">*هذا الرابط يعمل مؤقتاً في متصفحك الحالي فقط.</small>`;
        }

        // 2. تشغيل الملف المرفوع
        document.getElementById('fileUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                showInIframe(event.target.result);
            };
            reader.readAsText(file);
            e.target.value = ''; // تصفير الإدخال
        });

        // 3. سحب كود موقع (تخطي الحماية بواسطة Proxy)
        async function fetchWebsiteCode() {
            let url = document.getElementById('targetUrl').value.trim();
            if(!url) return alert("الرجاء إدخال رابط الموقع!");
            if(!url.startsWith('http')) url = 'https://' + url;

            const fetchBtn = document.getElementById('fetchBtn');
            const originalText = fetchBtn.innerHTML;
            fetchBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الاختراق والسحب...';
            
            // استخدام بروكسي مجاني لتخطي حماية CORS
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                if(data.contents) {
                    document.getElementById('fetchedCode').value = data.contents;
                } else {
                    document.getElementById('fetchedCode').value = "عذراً، لم نتمكن من قراءة محتوى هذا الموقع. قد يكون محمياً بقوة.";
                }
            } catch (error) {
                document.getElementById('fetchedCode').value = "خطأ في الاتصال! تأكد من الرابط أو أن الموقع يمنع السحب الخارجي.";
            }

            fetchBtn.innerHTML = originalText;
        }

        function copyFetchedCode() {
            const code = document.getElementById('fetchedCode');
            if(!code.value) return;
            code.select();
            document.execCommand('copy');
            alert('تم نسخ كود الموقع بنجاح!');
        }

        // دوال مساعدة للعرض
        function showInIframe(htmlContent) {
            const iframe = document.getElementById('viewer');
            iframe.srcdoc = htmlContent;
            document.getElementById('previewWindow').style.display = 'block';
            document.getElementById('previewWindow').scrollIntoView({ behavior: 'smooth' });
        }

        function closePreview() {
            document.getElementById('previewWindow').style.display = 'none';
            document.getElementById('viewer').srcdoc = '';
        }
    </script>
</body>
</html>
