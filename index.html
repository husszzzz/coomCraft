<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gom Craft | المنصة الرسمية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            scroll-behavior: smooth;
        }

        /* شريط الأخبار المتحرك */
        .news-ticker {
            background: var(--primary);
            color: black;
            padding: 10px 0;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* الهيدر / القسم الرئيسي */
        .hero-section {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://wallpaperaccess.com/full/1511.jpg');
            background-size: cover;
            background-attachment: fixed;
            text-align: center;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 600px;
        }

        /* تصميم الأقسام */
        .section-title {
            text-align: center;
            padding: 50px 0;
            font-size: 2.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* بطاقة اللاعبين (3D Tilt) */
        .player-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            transform-style: preserve-3d;
        }

        .player-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid var(--primary);
        }

        /* بطاقة البنايات (تصميم فخم) */
        .build-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            transition: 0.4s;
        }

        .build-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .build-info {
            padding: 20px;
        }

        /* تأثيرات إضافية */
        .btn-contact {
            background: var(--primary);
            color: black;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }

        #modal-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;
        }
    </style>
</head>
<body>

<div class="news-ticker">
    <marquee id="news-text">أهلاً بكم في سيرفر گوم كرافت - ترقبوا أقوى البطولات القادمة!</marquee>
</div>

<section class="hero-section" id="hero">
    <div class="hero-card" data-tilt>
        <h1 id="hero-title">جاري التحميل...</h1>
        <p id="hero-desc">المعلومات يتم جلبها من الجدول</p>
        <a href="#players" class="btn-contact">اكتشف الأعضاء</a>
    </div>
</section>

<h2 class="section-title" id="players">نخبة اللاعبين</h2>
<div class="container" id="players-list"></div>

<h2 class="section-title" id="builds">إبداعات گوم كرافت</h2>
<div class="container" id="builds-list"></div>

<script>
    const sheetID = '10RiRpOwdCtq8w_WwLJhUkUFxFPMkI595yiBqw2ET0pg';
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    async function init() {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const rows = json.table.rows;

        // 1. تحديث القسم الرئيسي (نأخذ أول صف بعد العنوان كمثال للتعريف بالسيرفر)
        document.getElementById('hero-title').innerText = rows[0].c[0].v;
        document.getElementById('hero-desc').innerText = rows[0].c[2].v;

        // 2. توزيع البيانات
        const playersList = document.getElementById('players-list');
        const buildsList = document.getElementById('builds-list');

        rows.forEach((row, index) => {
            if (index === 0) return; // تخطي العنوان

            const type = row.c[4] ? row.c[4].v : 'لاعب'; // العمود E لتحديد النوع (لاعب أو بناية)
            const name = row.c[0] ? row.c[0].v : '';
            const desc = row.c[2] ? row.c[2].v : '';
            const img = row.c[3] ? row.c[3].v : 'https://via.placeholder.com/150';

            if (type === 'لاعب') {
                const card = `
                    <div class="player-card" data-tilt>
                        <img src="${img}" alt="${name}">
                        <h3>${name}</h3>
                        <p>${row.c[1].v}</p>
                        <small>${desc}</small>
                    </div>`;
                playersList.innerHTML += card;
            } else if (type === 'بناية') {
                const card = `
                    <div class="build-card">
                        <img src="${img}" alt="${name}">
                        <div class="build-info">
                            <h3>${name}</h3>
                            <p>${desc}</p>
                        </div>
                    </div>`;
                buildsList.innerHTML += card;
            }
        });

        // تشغيل تأثير الـ 3D
        VanillaTilt.init(document.querySelectorAll("[data-tilt]"), {
            max: 15,
            speed: 400,
            glare: true,
            "max-glare": 0.2,
        });
    }

    init();
</script>
</body>
</html>
