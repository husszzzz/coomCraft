<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOM CRAFT | المنصة الرسمية</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* إعدادات التصميم الاحترافي */
        :root {
            --primary: #00ff88;
            --secondary: #2ecc71;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: var(--font);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* الأنيميشن الخلفي */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 136, 0.05) 0%, transparent 80%);
            z-index: -1; pointer-events: none;
        }

        /* الهيدر */
        nav {
            position: fixed; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; }
        .status-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--primary); animation: blink 1.5s infinite; }

        /* القسم الرئيسي Hero */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 0 20px;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        .hero h1 { font-size: 5rem; text-transform: uppercase; margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(0,255,136,0.4)); }
        .hero p { font-size: 1.2rem; color: #aaa; max-width: 600px; }

        /* الأقسام */
        section { padding: 100px 8%; }
        .section-header { margin-bottom: 50px; position: relative; }
        .section-header h2 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .section-header::after { content: ''; position: absolute; bottom: -10px; right: 0; width: 50px; height: 4px; background: var(--primary); }

        /* شبكة العرض */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        /* كارت اللاعبين */
        .player-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 25px;
            padding: 40px 20px; text-align: center; transition: 0.5s; cursor: pointer;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .player-card:hover { border-color: var(--primary); transform: translateY(-10px); background: rgba(0,255,136,0.02); }
        .player-card img { width: 120px; height: 120px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 20px; object-fit: cover; }
        .player-card h3 { font-size: 1.5rem; margin-bottom: 5px; }
        .player-card .rank { color: var(--primary); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }

        /* كارت البنايات */
        .build-card {
            height: 400px; border-radius: 20px; overflow: hidden; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .build-card img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        .build-card:hover img { transform: scale(1.1); }
        .build-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        /* نافذة المعلومات Modal */
        .modal {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95);
            display:none; justify-content:center; align-items:center; z-index:2000;
        }
        .modal-content {
            background:#111; padding:40px; border-radius:30px; border:1px solid var(--primary);
            text-align:center; max-width:500px; width:90%; position:relative;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            nav { padding: 15px 20px; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <div class="logo"><span class="status-dot"></span> GOM CRAFT</div>
    <div style="font-size: 0.8rem; color: #777;">VERSION 2.0</div>
</nav>

<section class="hero" id="home">
    <h1 id="hero-title">GOM CRAFT</h1>
    <p id="hero-desc">جاري مزامنة بيانات السيرفر من الجدول...</p>
    <div id="hero-extra" style="margin-top:20px; color:var(--primary); font-weight:bold;"></div>
</section>

<section id="players">
    <div class="section-header">
        <h2>نخبة اللاعبين</h2>
        <p>الأعضاء المسجلين في النظام</p>
    </div>
    <div class="grid" id="players-grid"></div>
</section>

<section id="builds">
    <div class="section-header">
        <h2>معرض البناء</h2>
        <p>أبرز مشاريع وإبداعات السيرفر</p>
    </div>
    <div class="grid" id="builds-grid"></div>
</section>

<div class="modal" id="infoModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="m-img" src="" style="width:100px; height:100px; border-radius:15px; margin-bottom:20px;">
        <h2 id="m-title"></h2>
        <div id="m-rank" style="color:var(--primary); margin:10px 0; font-weight:bold;"></div>
        <p id="m-desc" style="color:#ccc;"></p>
        <button onclick="document.getElementById('infoModal').style.display='none'" style="margin-top:25px; background:var(--primary); border:none; padding:10px 30px; border-radius:10px; cursor:pointer; font-weight:bold;">إغلاق</button>
    </div>
</div>

<script>
    // معرف الجدول الخاص بك
    const SHEET_ID = '10RiRpOwdCtq8w_WwLJhUkUFxFPMkI595yiBqw2ET0pg';
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function loadData() {
        try {
            const response = await fetch(DATA_URL);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;

            const pGrid = document.getElementById('players-grid');
            const bGrid = document.getElementById('builds-grid');

            rows.forEach((row, index) => {
                if (index === 0) return; // تخطي العناوين

                const type  = row.c[0] ? row.c[0].v : "";
                const name  = row.c[1] ? row.c[1].v : "";
                const info  = row.c[2] ? row.c[2].v : "";
                const img   = row.c[3] ? row.c[3].v : "";
                const extra = row.c[4] ? row.c[4].v : "";

                if (type === "Hero") {
                    document.getElementById('hero-title').innerText = name;
                    document.getElementById('hero-desc').innerText = info;
                    document.getElementById('hero-extra').innerText = extra;
                } 
                else if (type === "Player") {
                    createPlayer(name, info, img, extra, pGrid);
                } 
                else if (type === "Build") {
                    createBuild(name, info, img, bGrid);
                }
            });

            // تفعيل حركات الـ 3D
            VanillaTilt.init(document.querySelectorAll(".player-card"), { max: 15, speed: 400, glare: true, "max-glare": 0.2 });
            
            // أنيميشن الظهور
            gsap.from("section", { opacity: 0, y: 50, duration: 1, stagger: 0.3 });

        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
            document.getElementById('hero-desc').innerText = "تأكد من إعدادات مشاركة الجدول (Anyone with the link can view)";
        }
    }

    function createPlayer(name, rank, desc, img, container) {
        const card = document.createElement('div');
        card.className = 'player-card';
        const finalImg = img && img.includes('http') ? img : `https://mc-heads.net/avatar/${name}`;
        
        card.innerHTML = `
            <img src="${finalImg}" alt="${name}">
            <h3>${name}</h3>
            <div class="rank">${rank}</div>
            <p style="font-size:0.8rem; color:#666; margin-top:10px;">اضغط للتفاصيل</p>
        `;
        card.onclick = () => {
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-rank').innerText = rank;
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('m-img').src = finalImg;
            document.getElementById('infoModal').style.display = 'flex';
        };
        container.appendChild(card);
    }

    function createBuild(name, desc, img, container) {
        const card = document.createElement('div');
        card.className = 'build-card';
        card.innerHTML = `
            <img src="${img}" alt="${name}">
            <div class="build-overlay">
                <h3>${name}</h3>
                <p style="font-size:0.9rem; color:#ccc;">${desc}</p>
            </div>
        `;
        container.appendChild(card);
    }

    // بدء التحميل
    loadData();
</script>

</body>
</html>
