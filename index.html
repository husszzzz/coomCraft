<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gom Craft | أعضاء السيرفر</title>
    <style>
        :root {
            --primary: #55efc4; /* لون أخضر ماينكرافتي */
            --accent: #fab1a0;
            --bg: #121212;
            --card: #1e1e1e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(45deg, #000, #1a1a1a);
            border-bottom: 3px solid var(--primary);
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }
        .member-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #333;
            text-align: center;
            padding-bottom: 20px;
            cursor: pointer;
        }
        .member-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(85, 239, 196, 0.2);
            border-color: var(--primary);
        }
        .img-container {
            background: #2d3436;
            padding: 20px;
            margin-bottom: 15px;
        }
        .member-card img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--primary);
        }
        /* النافذة المنبثقة */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--primary);
        }
        .close-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>سيرفر گوم كرافت ⚔️</h1>
    <p>تصفح قائمة أعضاء الفريق وإنجازاتهم</p>
</header>

<div class="container" id="members-list">
    </div>

<div class="modal-overlay" id="overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <img id="modal-img" src="" style="width:100px; margin-bottom:15px;">
        <h2 id="modal-name"></h2>
        <p id="modal-rank" style="color: var(--primary);"></p>
        <hr style="border:0.5px solid #444">
        <p id="modal-bio"></p>
        <button class="close-btn" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    const sheetID = '10RiRpOwdCtq8w_WwLJhUkUFxFPMkI595yiBqw2ET0pg';
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    async function fetchData() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;
            const container = document.getElementById('members-list');

            rows.forEach((row, index) => {
                // تخطي العناوين إذا كانت موجودة في الصف الأول
                if(index === 0 && row.c[0]?.v === "الاسم") return;

                const name = row.c[0]?.v || "مجهول";
                const rank = row.c[1]?.v || "عضو";
                const bio = row.c[2]?.v || "لا توجد تفاصيل";
                let imgData = row.c[3]?.v || ""; // العمود الرابع للصور

                // منطق معالجة الصور
                let finalImg;
                if(imgData.includes('http')) {
                    finalImg = imgData; // إذا كان رابط مباشر
                } else if(imgData.length > 2) {
                    finalImg = `https://mc-heads.net/avatar/${imgData}`; // إذا كان اسم لاعب ماينكرافت
                } else {
                    finalImg = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}`; // صورة افتراضية
                }

                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${finalImg}" alt="${name}">
                    </div>
                    <h3>${name}</h3>
                    <p>${rank}</p>
                `;
                card.onclick = () => showModal(name, rank, bio, finalImg);
                container.appendChild(card);
            });
        } catch (e) {
            console.error("خطأ في التحميل:", e);
        }
    }

    function showModal(name, rank, bio, img) {
        document.getElementById('modal-name').innerText = name;
        document.getElementById('modal-rank').innerText = rank;
        document.getElementById('modal-bio').innerText = bio;
        document.getElementById('modal-img').src = img;
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
    }

    fetchData();
</script>

</body>
</html>
