<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شهادات الآيفون | الحسني</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#0ea5e9);
background-size:400% 400%;
animation:bg 12s ease infinite;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:move 20s linear infinite;
}

.circle:nth-child(1){
width:280px;
height:280px;
top:-80px;
left:-80px;
}

.circle:nth-child(2){
width:220px;
height:220px;
bottom:-60px;
right:-60px;
animation-duration:15s;
}

@keyframes move{
50%{
transform:translateY(40px) rotate(180deg);
}
100%{
transform:translateY(0) rotate(360deg);
}
}

.card{

width:92%;
max-width:520px;

background:rgba(255,255,255,.10);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

border-radius:30px;

padding:40px;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,.45);

animation:show .9s;
}

@keyframes show{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:none;
}
}

.logo{
font-size:70px;
margin-bottom:15px;
}

h1{
color:#fff;
font-size:34px;
font-weight:900;
}

.desc{
color:#dbeafe;
margin-top:12px;
margin-bottom:35px;
line-height:1.9;
}

.btn{

display:block;

text-decoration:none;

color:#fff;

font-size:20px;

font-weight:bold;

padding:18px;

margin:18px 0;

border-radius:18px;

background:linear-gradient(135deg,#2563eb,#06b6d4);

transition:.3s;

box-shadow:0 10px 25px rgba(37,99,235,.4);

}

.btn:hover{

transform:translateY(-5px) scale(1.03);

box-shadow:0 15px 40px rgba(0,0,0,.45);

}

footer{

margin-top:35px;

border-top:1px solid rgba(255,255,255,.15);

padding-top:25px;

color:white;

}

footer h3{

font-size:22px;

}

footer p{

margin-top:8px;

color:#cbd5e1;

}

.badge{

display:inline-block;

padding:8px 18px;

background:#22c55e;

color:white;

border-radius:50px;

margin-bottom:25px;

font-size:15px;

box-shadow:0 0 20px rgba(34,197,94,.5);

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.08);

}

}

</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="card">

<div class="logo">🍎</div>

<div class="badge">
متوفر الآن
</div>

<h1>
شهادات الآيفون
</h1>

<p class="desc">
اختر أحد المواقع للحصول على شهادة مجانية لتثبيت التطبيقات على جهازك.
</p>

<a class="btn"
href="https://husszzzz.github.io/Tyt/"
target="_blank">
🚀 الموقع الأول
</a>

<a class="btn"
href="https://khoindvn.io.vn/#google_vignette"
target="_blank">
⚡ الموقع الثاني
</a>

<footer>

<h3>
الحقوق © الحسني
</h3>

<p>
Telegram : @OM_G9
</p>

</footer>

</div>

</body>
</html>
