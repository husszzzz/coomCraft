<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة الحسني | مشغل الأكواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --primary: #007aff;
            --text: #ffffff;
            --card-bg: #1c1c1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 122, 255, 0.1), transparent 70%);
        }

        .header { margin-top: 30px; text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; color: var(--primary); text-shadow: 0 0 20px rgba(0, 122, 255, 0.4); }
        .header p { color: #8e8e93; margin-top: 5px; }

        /* حاوية المدخلات */
        .input-section { 
            width: 100%; 
            max-width: 700px; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid #3a3a3c; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group { margin-bottom: 25px; text-align: right; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--primary); font-size: 1.1rem; }

        /* تصميم منطقة النص */
        textarea { 
            width: 100%; 
            height: 250px; 
            background: #000; 
            color: #32d74b; 
            border: 1px solid #3a3a3c; 
            border-radius: 15px; 
            padding: 15px; 
            direction: ltr; 
            font-family: 'Courier New', monospace; 
            resize: none; 
            outline: none;
            font-size: 0.95rem;
            box-shadow: inset 0 0 10px rgba(50, 215, 75, 0.1);
        }

        .run-btn { 
            background: linear-gradient(135deg, #007aff, #005bb5); 
            color: #fff; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 15px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .run-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 122, 255, 0.4); }

        footer { margin-top: auto; padding: 30px; color: #8e8e93; font-size: 0.9rem; }
        footer span { color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>

    <div class="header">
        <h1>أداة الحسني</h1>
        <p>مشغل الأكواد المباشر في صفحة جديدة</p>
    </div>

    <div class="input-section">
        <div class="input-group">
            <label><i class="fa-solid fa-code"></i> الصق كود HTML الخاص بك:</label>
            <textarea id="htmlCode" placeholder="<html>
  <body>
    <h1>مرحباً بك في أداة الحسني</h1>
  </body>
</html>"></textarea>
        </div>

        <button class="run-btn" onclick="openCodeInNewTab()">
            <i class="fa-solid fa-rocket"></i> تشغيل في صفحة جديدة
        </button>
    </div>

    <footer>تم التطوير بواسطة <span>الحسني</span> &copy; 2026</footer>

    <script>
        function openCodeInNewTab() {
            const code = document.getElementById('htmlCode').value;
            
            if (!code.trim()) {
                alert("يا بطل، لازم تلصق الكود أولاً حتى أشغله لك!");
                return;
            }

            // فتح نافذة جديدة فارغة
            const newWindow = window.open();
            
            if (newWindow) {
                // كتابة الكود داخل النافذة الجديدة
                newWindow.document.open();
                newWindow.document.write(code);
                newWindow.document.close();
            } else {
                alert("يرجى السماح للمتصفح بفتح النوافذ المنبثقة (Pop-ups) لتشغيل الكود.");
            }
        }
    </script>
</body>
</html>
