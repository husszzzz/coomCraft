<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASSANY - شهادات مجانية</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .header-img {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0,122,255,0.5);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .username {
            color: #007aff;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .btn-container {
            width: 100%;
            max-width: 350px;
        }

        .main-btn {
            display: block;
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .main-btn:hover {
            background-color: #007aff;
            border-color: #007aff;
        }

        .cert-btn {
            background: linear-gradient(90deg, #007aff, #00c6ff);
            border: none;
        }

        .footer {
            margin-top: 50px;
            font-size: 14px;
            color: #777;
        }

        /* تنبيه النسخ */
        #copy-toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 10px;
            position: fixed;
            bottom: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <img src="https://via.placeholder.com/120" alt="Logo" class="header-img">
    
    <h1>HASSANY STORE</h1>
    <p class="username">@hassany</p>

    <div class="btn-container">
        <a href="رابط_ملف_الشهادة_هنا" class="main-btn cert-btn">تحميل الشهادة (Aramco)</a>

        <a href="itms-services://?action=download-manifest&url=رابط_ملف_الـPLIST_هنا" class="main-btn">تثبيت E-Sign</a>
        
        <a href="itms-services://?action=download-manifest&url=رابط_ملف_الـPLIST_هنا" class="main-btn">تثبيت Scarlet</a>

        <div class="main-btn" style="cursor: pointer;" onclick="copyText('@hassany')">
            نسخ باسورد الشهادة
        </div>
    </div>

    <div class="footer">
        Rights Reserved to <b>Hassany</b> &copy; 2026
    </div>

    <div id="copy-toast">تم نسخ الباسورد بنجاح!</div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            var x = document.getElementById("copy-toast");
            x.style.visibility = "visible";
            setTimeout(function(){ x.style.visibility = "hidden"; }, 2000);
        }
    </script>

</body>
</html>
