<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassany IPA Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #007aff;
            --card: #1c1c1e;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            padding-bottom: 50px;
        }

        header {
            padding: 40px 20px;
            background: linear-gradient(to bottom, #1d1d1f, #000);
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.4);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .app-card {
            background: var(--card);
            border-radius: 22px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            border: 1px solid #2c2c2e;
        }

        .app-card:hover { transform: scale(1.02); background: #2c2c2e; }

        .icon-box {
            width: 65px;
            height: 65px;
            background: #2c2c2e;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent);
        }

        .info { flex-grow: 1; text-align: right; }
        .name { font-size: 17px; font-weight: 700; }
        .meta { font-size: 12px; color: #8e8e93; margin-top: 4px; }

        .btn-get {
            background: #2c2c2e;
            color: var(--accent);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            min-width: 75px;
            transition: 0.3s;
        }

        .loading { color: transparent !important; position: relative; }
        .loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin: -8px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success-btn { background: #32d74b !important; color: #000 !important; }
    </style>
</head>
<body>

<header>
    <img src="Hassany_Icon.png" alt="Logo" class="logo-img">
    <h1>Hassany IPA</h1>
    <p>حصريات التعديل والملفات النادرة</p>
</header>

<div class="container">
    
    <div class="app-card">
        <div class="icon-box"><i class="fas fa-microphone-alt"></i></div>
        <div class="info">
            <div class="name">تطبيق المايك (Hassany)</div>
            <div class="meta">تضخيم 100% | v2.0</div>
        </div>
        <button class="btn-get" onclick="download(this, 'رابط_ملف_المايك_هنا')">GET</button>
    </div>

    <div class="app-card">
        <div class="icon-box"><i class="fas fa-ghost"></i></div>
        <div class="info">
            <div class="name">لعبة الرعب 3D</div>
            <div class="meta">Hassany Game | v1.0</div>
        </div>
        <button class="btn-get" onclick="download(this, 'رابط_ملف_اللعبة_هنا')">GET</button>
    </div>

    <div class="app-card">
        <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
        <div class="info">
            <div class="name">ملف كشف أماكن</div>
            <div class="meta">أمن 100% | تحديث جديد</div>
        </div>
        <button class="btn-get" onclick="download(this, 'رابط_ملف_كشف_الاماكن_هنا')">GET</button>
    </div>

</div>

<footer>
    <p>المطور حسين الحسني @OM_G9</p>
</footer>

<script>
function download(btn, link) {
    if(btn.classList.contains('loading')) return;
    
    btn.classList.add('loading');
    
    // محاكاة التحميل (3 ثواني)
    setTimeout(() => {
        btn.classList.remove('loading');
        btn.classList.add('success-btn');
        btn.innerHTML = '<i class="fas fa-check"></i>';
        
        // فتح الرابط بعد ظهور علامة الصح
        setTimeout(() => {
            window.location.href = link;
            // إرجاع الزر لوضعه الطبيعي بعد فترة
            setTimeout(() => {
                btn.classList.remove('success-btn');
                btn.innerText = 'GET';
            }, 3000);
        }, 500);
    }, 3000);
}
</script>

</body>
</html>
